name: Smartfarm Server CI/CD

# OCI(A, oci-arm1) 배포 — systemd 서비스 방식
# 시크릿은 서버의 /etc/app-secrets/smartfarm.env 에 보관.
# 센서 에이전트 systemd 유닛(User=opc)은 서버에 이미 등록되어 코드만 갱신한다.

on:
  push:
    branches: [ "main" ]
    paths:
      - 'src/**'
      - 'build.gradle'
      - 'settings.gradle'
      - 'gradle/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 1. 코드 체크아웃
        uses: actions/checkout@v4

      - name: 2. JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'corretto'

      - name: 3. 빌드 (테스트 제외)
        run: |
          chmod +x gradlew
          ./gradlew bootJar -x test

      - name: 4. jar 업로드 (staging)
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "build/libs/*SNAPSHOT.jar"
          target: "/home/opc/apps/smartfarm/staging"
          strip_components: 2
          rm: true

      - name: 4-1. 센서 에이전트 코드 업로드
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "src/scripts/sensor_agent.py,src/scripts/requirements.txt"
          target: "/home/opc/apps/smartfarm-sensor-agent"
          strip_components: 2

      - name: 5. 배포 + 재시작 + 헬스체크
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          command_timeout: 5m
          script: |
            set -e
            APP=smartfarm; PORT=8084
            JAR=$(ls /home/opc/apps/$APP/staging/*.jar | grep -v plain | head -1)
            echo "> 배포 jar: $JAR"
            cp "$JAR" /home/opc/apps/$APP/$APP.jar
            rm -rf /home/opc/apps/$APP/staging
            sudo systemctl restart $APP
            echo "> 백엔드 재시작, 헬스체크..."
            UP=0
            for i in $(seq 1 12); do
              sleep 5
              CODE=$(curl -s -o /dev/null -w "%{http_code}" http://127.0.0.1:$PORT/api/health 2>/dev/null || echo 000)
              if [ "$CODE" = "200" ] || [ "$CODE" = "302" ] || [ "$CODE" = "401" ]; then echo "> ✅ $APP 정상 (HTTP $CODE)"; UP=1; break; fi
              echo "> 시도 $i/12 (HTTP $CODE)..."
            done
            if [ "$UP" != "1" ]; then echo "> ❌ $APP 기동 실패"; sudo journalctl -u $APP -n 40 --no-pager; exit 1; fi
            # 센서 에이전트 코드 갱신 → 재시작 (systemd 유닛은 서버에 이미 등록됨)
            pip3 install -q -r /home/opc/apps/smartfarm-sensor-agent/requirements.txt 2>/dev/null || sudo python3 -m pip install -q -r /home/opc/apps/smartfarm-sensor-agent/requirements.txt
            sudo systemctl restart smartfarm-sensor-agent || true
            echo "> 🐍 센서 에이전트 갱신/재시작 완료"
