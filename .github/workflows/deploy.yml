name: Smartfarm Server CI/CD

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 1. 저장소 코드 가져오기
        uses: actions/checkout@v3

      - name: 2. JDK 21 세팅
        uses: actions/setup-java@v3
        with:
          java-version: '21'
          distribution: 'corretto'

      - name: 3. Gradle 실행 권한 부여
        run: chmod +x gradlew

      - name: 4. 프로젝트 빌드 (테스트 제외)
        run: ./gradlew clean build -x test

      - name: 5. 빌드된 jar 파일을 EC2로 전송 (SCP)
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "build/libs/*SNAPSHOT.jar"
          target: "/home/ec2-user/smartfarm"
          strip_components: 2

      - name: 6. EC2에 접속해서 기존 서버 내리고 새 서버 실행 (SSH)
        uses: appleboy/ssh-action@master
        env:
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_USERNAME: ${{ secrets.DB_USERNAME }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          REDIS_HOST: ${{ secrets.REDIS_HOST }}
          REDIS_PORT: ${{ secrets.REDIS_PORT }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: DB_HOST,DB_USERNAME,DB_PASSWORD,REDIS_HOST,REDIS_PORT
          script: |
            cd /home/ec2-user/smartfarm

            # 1. 현재 폴더에 전송된 최신 JAR 파일 찾기
            JAR_PATH=$(ls -tr *.jar | tail -n 1)

            if [ -z "$JAR_PATH" ]; then
              echo "❌ 에러: 실행할 JAR 파일이 폴더에 없습니다!"
              exit 1
            fi

            # 2. 현재 Nginx가 바라보고 있는 포트 확인
            CURRENT_PORT=$(grep -o '808[34]' /etc/nginx/conf.d/smartfarm-url.inc)
            if [ "${CURRENT_PORT}" = "8083" ]; then
              TARGET_PORT=8084
            else
              TARGET_PORT=8083
            fi

            echo "======================================"
            echo "> 현재 활성화된 포트: ${CURRENT_PORT}"
            echo "> 새로 배포할 타겟 포트: ${TARGET_PORT}"
            echo "> 실행 파일: ${JAR_PATH}"
            echo "======================================"

            # 환경 변수 확인 (디버깅용)
            echo "🔍 환경변수 확인:"
            echo "DB_HOST=${DB_HOST}"
            echo "DB_USERNAME=${DB_USERNAME}"
            echo "DB_PASSWORD=${DB_PASSWORD:0:5}***" # 비밀번호는 일부만 표시
            echo "REDIS_HOST=${REDIS_HOST}"
            echo "REDIS_PORT=${REDIS_PORT}"

            # 3. 혹시나 타겟 포트에 좀비 프로세스가 있다면 먼저 죽이기 (안전 장치)
            TARGET_PID=$(sudo lsof -ti:${TARGET_PORT})
            if [ ! -z "$TARGET_PID" ]; then
              echo "> 좀비 프로세스 발견(PID: ${TARGET_PID}), 종료합니다."
              sudo kill -9 ${TARGET_PID}
            fi

            # 4. 타겟 포트에 새 서버 실행 (환경 변수와 함께)
            nohup java -jar \
            -Dspring.profiles.active=prod \
            -Dserver.port=${TARGET_PORT} \
            -Dspring.datasource.url="jdbc:mysql://${DB_HOST}:3306/smartfarm?useSSL=false&serverTimezone=Asia/Seoul&characterEncoding=UTF-8&rewriteBatchedStatements=true" \
            -Dspring.datasource.username="${DB_USERNAME}" \
            -Dspring.datasource.password="${DB_PASSWORD}" \
            -Dspring.data.redis.host="${REDIS_HOST}" \
            -Dspring.data.redis.port="${REDIS_PORT}" \
            $JAR_PATH > nohup.out 2>&1 &

            # 5. Health Check
            echo "> 새 서버가 켜질 때까지 기다립니다..."

            for RETRY_COUNT in {1..10}
            do
              echo "> Health Check 시도 (${RETRY_COUNT}/10)..."
              sleep 10
              RESPONSE=$(curl -s http://127.0.0.1:${TARGET_PORT}/api/health)

              if [ "${RESPONSE}" = "OK" ]; then
                echo "> Health Check 성공!"

                # Nginx 스위칭
                echo "set \$smartfarm_url http://127.0.0.1:${TARGET_PORT};" | sudo tee /etc/nginx/conf.d/smartfarm-url.inc
                sudo systemctl reload nginx

                # 구버전 서버 종료
                CURRENT_PID=$(sudo lsof -ti:${CURRENT_PORT})
                if [ ! -z "$CURRENT_PID" ]; then
                  sudo kill -9 ${CURRENT_PID}
                fi

                echo "> 🚀 무중단 배포 완료!"
                exit 0
              fi
            done

            echo "> ❌ 배포 실패. 타겟 서버를 종료합니다."

            # 서버 로그 확인 (디버깅용)
            echo ""
            echo "📋 서버 시작 로그 (마지막 30줄):"
            tail -30 nohup.out
            echo ""

            sudo lsof -ti:${TARGET_PORT} | xargs -r sudo kill -9
            exit 1
