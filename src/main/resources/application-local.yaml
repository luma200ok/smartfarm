# 로컬(Local) 환경 설정 파일
server:
  port: 8080

spring:
  data:
    redis:
      host: localhost
      port: 6380 # (로컬 Redis 포트)

  datasource:
    # 로컬 개발용 MySQL
    url: jdbc:mysql://localhost:3306/smartfarm?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=Asia/Seoul&allowPublicKeyRetrieval=true&characterEncoding=UTF-8&rewriteBatchedStatements=true
    username: root
    password: ${MYSQL_PASSWORD} 
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update # 로컬에서는 개발 편의를 위해 테이블 자동 업데이트를 켭니다.
    show-sql: true     # 실행되는 SQL 확인 가능
    properties:
      hibernate:
        format_sql: true
        jdbc:
          batch_size: 500
        order_inserts: true
