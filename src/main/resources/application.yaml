# 공통(Default) 설정 파일
server:
  forward-headers-strategy: native

spring:
  application:
    name: smartfarm_server

  # 기본으로 활성화할 프로파일 (local 환경을 기본으로 띄웁니다)
  profiles:
    active: local

# ---------------------------------------------------------
# 커스텀 설정 (Custom Properties)
# ---------------------------------------------------------
smartfarm:
  sensor:
    # DB에 설정값이 없을 때 사용할 기본 임계치
    default-temp-threshold-high: 26.0      # 온도 상한 (쿨링팬 ON)
    default-temp-threshold-low: 20.0       # 온도 하한 (쿨링팬 OFF)
    default-humidity-threshold-high: 70.0  # 습도 상한 (가습기 ON)
    default-humidity-threshold-low: 40.0   # 습도 하한 (가습기 OFF)

    # 데이터 유효성 검사를 위한 범위 설정
    validation:
      temp-min: -50.0
      temp-max: 150.0
      humidity-min: 0.0
      humidity-max: 100.0

  batch:
    # 1분(60000ms) 단위 스케줄링 간격
    interval-ms: 60000
    # 일간 리포트 발송 시각 (cron). 기본: 매일 자정
    report-cron: "0 0 0 * * *"

  notification:
    # 환경변수 DISCORD_WEBHOOK_URL에서 주입 (미설정 시 빈 문자열)
    discord-webhook-url: ${DISCORD_WEBHOOK_URL:}
    # 같은 기기/같은 종류 알림 재발송 금지 대기 시간 (초). 기본 2분
    cooldown-seconds: 120
