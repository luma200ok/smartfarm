# 공통(Default) 설정 파일
spring:
  application:
    name: smartfarm_server
  
  # 기본으로 활성화할 프로파일 (local 환경을 기본으로 띄웁니다)
  profiles:
    active: local

# ---------------------------------------------------------
# 커스텀 설정 (Custom Properties)
# 앱 내에서 사용할 하드코딩된 숫자들을 설정 파일로 뺐습니다.
# ---------------------------------------------------------
smartfarm:
  sensor:
    # DB에 설정값이 없을 때 사용할 기본 온도/습도 임계치
    default-temp-threshold: 70.0
    default-humidity-threshold: 80.0
  batch:
    # 1분(60000ms) 단위 스케줄링 간격
    interval-ms: 60000
