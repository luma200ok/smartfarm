# 운영(Prod) 환경 설정 파일
server:
  port: 80 # 배포 환경에서는 기본 HTTP 포트를 사용하는 경우가 많습니다.

spring:
  data:
    redis:
      # AWS ElastiCache 등 운영 서버의 Redis 주소를 환경변수로 받습니다.
      host: ${REDIS_HOST}
      port: ${REDIS_PORT:6379}

  datasource:
    # AWS RDS 등 운영 서버의 MySQL 주소를 환경변수로 받습니다.
    url: jdbc:mysql://${DB_HOST}:3306/smartfarm?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=Asia/Seoul&characterEncoding=UTF-8&rewriteBatchedStatements=true
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update # 첫 배포 시 테이블 생성, 이후 운영 단계에서는 validate로 변경 권장
    show-sql: false    # 운영에서는 로그가 너무 많이 쌓이므로 SQL 출력을 끕니다.
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect # MySQL 8.0+ 방언 명시
        format_sql: false
        jdbc:
          batch_size: 1000
        order_inserts: true
