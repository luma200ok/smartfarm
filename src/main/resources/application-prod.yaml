# 운영(Prod) 환경 설정 파일
spring:
  data:
    redis:
      # AWS ElastiCache 등 운영 서버의 Redis 주소를 환경변수로 받습니다.
      host: ${REDIS_HOST}
      port: ${REDIS_PORT:6379}
      timeout: 2000ms # Redis 타임아웃 명시적 설정 (기본 2초)

  datasource:
    # AWS RDS 등 운영 서버의 MySQL 주소를 환경변수로 받습니다.
    url: jdbc:mysql://${DB_HOST}:3306/smartfarm?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=Asia/Seoul&characterEncoding=UTF-8&rewriteBatchedStatements=true
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false    # 운영에서는 로그가 너무 많이 쌓이므로 SQL 출력을 끕니다.
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect # MySQL 8.0+ 방언 명시
        format_sql: false
        jdbc:
          batch_size: 1000
        order_inserts: true

# 커스텀 설정 (application.yaml에서 상속하면서 필요한 부분 명시)
smartfarm:
  sensor:
    default-temp-threshold-high: 26.0
    default-temp-threshold-low: 20.0
    default-humidity-threshold-high: 70.0
    default-humidity-threshold-low: 40.0

    validation:
      temp-min: -50.0
      temp-max: 150.0
      humidity-min: 0.0
      humidity-max: 100.0

  batch:
    interval-ms: 60000
    report-cron: "0 0 0 * * *"

  notification:
    discord-webhook-url: ${DISCORD_WEBHOOK_URL:}
    cooldown-seconds: 120
