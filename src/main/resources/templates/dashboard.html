<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart-PC Farm | 모니터링 대시보드</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            min-height: 100vh;
        }

        header {
            background: #1e293b;
            border-bottom: 1px solid #334155;
            padding: 16px 32px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        header h1 {
            font-size: 1.4rem;
            color: #38bdf8;
            letter-spacing: 0.5px;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .device-selector {
            background: #334155;
            border: 1px solid #475569;
            color: #e2e8f0;
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 0.9rem;
            cursor: pointer;
        }

        .status-badge {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.85rem;
            color: #94a3b8;
        }

        .header-btn {
            background: #334155;
            border: 1px solid #475569;
            color: #94a3b8;
            padding: 6px 14px;
            border-radius: 6px;
            font-size: 0.8rem;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.2s;
        }

        .header-btn:hover {
            background: #475569;
            color: #e2e8f0;
        }

        .header-btn.btn-config {
            border-color: #38bdf8;
            color: #38bdf8;
        }

        .header-btn.btn-config:hover {
            background: #1e3a5f;
        }

        /* 모달 */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.6);
            z-index: 100;
            align-items: center;
            justify-content: center;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal-box {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 12px;
            padding: 28px;
            width: 100%;
            max-width: 420px;
        }

        .modal-box h3 {
            font-size: 1rem;
            color: #38bdf8;
            margin-bottom: 20px;
        }

        .modal-field {
            margin-bottom: 16px;
        }

        .modal-field label {
            display: block;
            font-size: 0.8rem;
            color: #64748b;
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .modal-field input {
            width: 100%;
            background: #0f172a;
            border: 1px solid #334155;
            color: #e2e8f0;
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 0.9rem;
        }

        .modal-field input:focus {
            outline: none;
            border-color: #38bdf8;
        }

        .modal-actions {
            display: flex;
            gap: 8px;
            justify-content: flex-end;
            margin-top: 20px;
        }

        .btn-save {
            background: #0369a1;
            border: none;
            color: #e2e8f0;
            padding: 8px 20px;
            border-radius: 6px;
            font-size: 0.85rem;
            cursor: pointer;
        }

        .btn-save:hover { background: #0284c7; }

        .btn-cancel {
            background: transparent;
            border: 1px solid #475569;
            color: #94a3b8;
            padding: 8px 20px;
            border-radius: 6px;
            font-size: 0.85rem;
            cursor: pointer;
        }

        .btn-cancel:hover { background: #334155; }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #22c55e;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        main {
            padding: 24px 32px;
            max-width: 1400px;
            margin: 0 auto;
        }

        /* 통계 요약 패널 */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 16px;
            margin-bottom: 24px;
        }

        .stat-card {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 10px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .stat-card .label {
            font-size: 0.8rem;
            color: #64748b;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .stat-card .value {
            font-size: 2rem;
            font-weight: 700;
            line-height: 1;
        }

        .stat-card .unit {
            font-size: 0.9rem;
            color: #94a3b8;
        }

        .stat-max .value { color: #f87171; }
        .stat-min .value { color: #60a5fa; }
        .stat-avg .value { color: #facc15; }
        .stat-humidity .value { color: #34d399; }

        /* 그래프 영역 */
        .charts-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-bottom: 24px;
        }

        .chart-card {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 10px;
            padding: 20px;
        }

        .chart-card h3 {
            font-size: 0.95rem;
            color: #94a3b8;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .chart-card h3 span {
            width: 10px;
            height: 10px;
            border-radius: 2px;
            display: inline-block;
        }

        .chart-container {
            position: relative;
            height: 240px;
        }

        /* 이벤트 로그 테이블 */
        .log-card {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 10px;
            padding: 20px;
        }

        .log-card h3 {
            font-size: 0.95rem;
            color: #94a3b8;
            margin-bottom: 16px;
        }

        .log-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.875rem;
        }

        .log-table th {
            text-align: left;
            padding: 10px 12px;
            background: #0f172a;
            color: #64748b;
            font-weight: 500;
            border-bottom: 1px solid #334155;
        }

        .log-table td {
            padding: 10px 12px;
            border-bottom: 1px solid #1e293b;
            color: #cbd5e1;
        }

        .log-table tr:hover td {
            background: #1a2744;
        }

        .event-badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: 600;
        }

        .event-COOLING_FAN_ON { background: #1e3a5f; color: #60a5fa; }
        .event-HEATER_ON { background: #3f1515; color: #f87171; }
        .event-default { background: #2d2d2d; color: #94a3b8; }

        .log-empty {
            text-align: center;
            padding: 32px;
            color: #475569;
        }

        .refresh-btn {
            background: #334155;
            border: 1px solid #475569;
            color: #94a3b8;
            padding: 6px 14px;
            border-radius: 6px;
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .refresh-btn:hover {
            background: #475569;
            color: #e2e8f0;
        }

        .section-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 16px;
        }

        .loading {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 240px;
            color: #475569;
            font-size: 0.9rem;
        }

        @media (max-width: 1024px) {
            .charts-grid { grid-template-columns: 1fr; }
            .stats-grid { grid-template-columns: repeat(2, 1fr); }
        }

        @media (max-width: 640px) {
            main { padding: 16px; }
            .stats-grid { grid-template-columns: 1fr 1fr; }
        }
    </style>
</head>
<body>

<header>
    <h1>&#9670; Smart-PC Farm Dashboard</h1>
    <div class="header-right">
        <select class="device-selector" id="deviceSelect">
            <option value="">기기 로딩 중...</option>
        </select>
        <div class="status-badge">
            <div class="status-dot"></div>
            <span id="lastUpdated">연결 중...</span>
        </div>
        <button class="header-btn btn-config" onclick="openConfigModal()">&#9881; 기기 설정</button>
        <form th:action="@{/logout}" method="POST" style="margin:0;">
            <button type="submit" class="header-btn">로그아웃</button>
        </form>
    </div>
</header>

<!-- 기기 설정 모달 -->
<div class="modal-overlay" id="configModal">
    <div class="modal-box">
        <h3>&#9881; 기기 임계값 설정</h3>
        <div class="modal-field">
            <label>기기 ID</label>
            <input type="text" id="configDeviceId" readonly style="color:#64748b; cursor:not-allowed;">
        </div>
        <div class="modal-field">
            <label>고온 임계값 (°C)</label>
            <input type="number" id="configTempThreshold" step="0.1" min="0" max="150">
        </div>
        <div class="modal-field">
            <label>고습 임계값 (%)</label>
            <input type="number" id="configHumidityThreshold" step="0.1" min="0" max="100">
        </div>
        <div id="configMessage" style="font-size:0.8rem; color:#22c55e; min-height:18px;"></div>
        <div class="modal-actions">
            <button class="btn-cancel" onclick="closeConfigModal()">취소</button>
            <button class="btn-save" onclick="saveConfig()">저장</button>
        </div>
    </div>
</div>

<main>

    <!-- 오늘의 통계 요약 패널 -->
    <div class="stats-grid">
        <div class="stat-card stat-max">
            <div class="label">최고 온도</div>
            <div class="value" id="maxTemp">--</div>
            <div class="unit">°C</div>
        </div>
        <div class="stat-card stat-min">
            <div class="label">최저 온도</div>
            <div class="value" id="minTemp">--</div>
            <div class="unit">°C</div>
        </div>
        <div class="stat-card stat-avg">
            <div class="label">평균 온도</div>
            <div class="value" id="avgTemp">--</div>
            <div class="unit">°C</div>
        </div>
        <div class="stat-card stat-humidity">
            <div class="label">평균 습도</div>
            <div class="value" id="avgHumidity">--</div>
            <div class="unit">%</div>
        </div>
    </div>

    <!-- 실시간 그래프 -->
    <div class="charts-grid">
        <div class="chart-card">
            <h3>
                <span style="background:#f87171;"></span>
                실시간 온도 (°C)
            </h3>
            <div class="chart-container">
                <canvas id="temperatureChart"></canvas>
            </div>
        </div>
        <div class="chart-card">
            <h3>
                <span style="background:#34d399;"></span>
                실시간 습도 (%)
            </h3>
            <div class="chart-container">
                <canvas id="humidityChart"></canvas>
            </div>
        </div>
    </div>

    <!-- 제어 이벤트 로그 테이블 -->
    <div class="log-card">
        <div class="section-header">
            <h3>&#9889; 제어 이벤트 로그 (쿨링팬 / 히터 가동 이력)</h3>
            <button class="refresh-btn" onclick="loadEventLogs()">새로 고침</button>
        </div>
        <div id="eventLogContainer">
            <div class="log-empty">데이터를 불러오는 중...</div>
        </div>
    </div>

</main>

<script>
    // ─── 상태 관리 ───────────────────────────────────────────────
    let currentDeviceId = '';
    let temperatureChart = null;
    let humidityChart = null;
    const MAX_DATA_POINTS = 20;

    // ─── Chart.js 초기화 ─────────────────────────────────────────
    function createChart(canvasId, label, color) {
        const ctx = document.getElementById(canvasId).getContext('2d');
        return new Chart(ctx, {
            type: 'line',
            data: {
                labels: [],
                datasets: [{
                    label: label,
                    data: [],
                    borderColor: color,
                    backgroundColor: color + '20',
                    borderWidth: 2,
                    pointRadius: 3,
                    pointHoverRadius: 5,
                    tension: 0.4,
                    fill: true,
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                animation: { duration: 300 },
                interaction: { mode: 'index', intersect: false },
                scales: {
                    x: {
                        ticks: { color: '#64748b', maxTicksLimit: 8, font: { size: 11 } },
                        grid: { color: '#1e293b' }
                    },
                    y: {
                        ticks: { color: '#64748b', font: { size: 11 } },
                        grid: { color: '#334155' }
                    }
                },
                plugins: {
                    legend: { display: false },
                    tooltip: {
                        backgroundColor: '#1e293b',
                        borderColor: '#334155',
                        borderWidth: 1,
                        titleColor: '#94a3b8',
                        bodyColor: '#e2e8f0',
                    }
                }
            }
        });
    }

    // ─── 히스토리 데이터 로드 (그래프 초기화) ───────────────────────
    async function loadHistory() {
        try {
            const res = await fetch(`/api/dashboard/history?deviceId=${currentDeviceId}&page=0&size=${MAX_DATA_POINTS}`);
            if (!res.ok) return;
            const data = await res.json();
            const items = data.content.reverse(); // 최신순 → 오래된 순 정렬

            temperatureChart.data.labels = [];
            temperatureChart.data.datasets[0].data = [];
            humidityChart.data.labels = [];
            humidityChart.data.datasets[0].data = [];

            items.forEach(item => {
                const label = formatTime(item.timestamp);
                temperatureChart.data.labels.push(label);
                temperatureChart.data.datasets[0].data.push(item.temperature.toFixed(1));
                humidityChart.data.labels.push(label);
                humidityChart.data.datasets[0].data.push(item.humidity.toFixed(1));
            });

            temperatureChart.update();
            humidityChart.update();
        } catch (e) {
            console.error('히스토리 로드 실패:', e);
        }
    }

    // ─── 통계 데이터 로드 ────────────────────────────────────────
    async function loadStatistics() {
        try {
            const res = await fetch(`/api/dashboard/statistics/today?deviceId=${currentDeviceId}`);
            if (res.status === 204) {
                setStatValues('--', '--', '--', '--');
                return;
            }
            if (!res.ok) return;
            const data = await res.json();
            setStatValues(
                data.maxTemperature.toFixed(1),
                data.minTemperature.toFixed(1),
                data.avgTemperature.toFixed(1),
                data.avgHumidity.toFixed(1)
            );
        } catch (e) {
            console.error('통계 로드 실패:', e);
        }
    }

    function setStatValues(max, min, avg, humidity) {
        document.getElementById('maxTemp').textContent = max;
        document.getElementById('minTemp').textContent = min;
        document.getElementById('avgTemp').textContent = avg;
        document.getElementById('avgHumidity').textContent = humidity;
    }

    // ─── 이벤트 로그 로드 ────────────────────────────────────────
    async function loadEventLogs() {
        const container = document.getElementById('eventLogContainer');
        try {
            const res = await fetch(`/dashboard/events?deviceId=${currentDeviceId}&page=0&size=20`);
            if (!res.ok) {
                container.innerHTML = '<div class="log-empty">데이터를 불러오지 못했습니다.</div>';
                return;
            }
            const data = await res.json();
            const items = data.content;

            if (items.length === 0) {
                container.innerHTML = '<div class="log-empty">제어 이벤트 이력이 없습니다.</div>';
                return;
            }

            const rows = items.map(item => {
                const badgeClass = item.eventType === 'COOLING_FAN_ON' ? 'event-COOLING_FAN_ON'
                    : item.eventType === 'HEATER_ON' ? 'event-HEATER_ON'
                    : 'event-default';
                return `
                    <tr>
                        <td>${formatDateTime(item.timestamp)}</td>
                        <td><span class="event-badge ${badgeClass}">${item.eventType}</span></td>
                        <td>${item.message || '-'}</td>
                    </tr>
                `;
            }).join('');

            container.innerHTML = `
                <table class="log-table">
                    <thead>
                        <tr>
                            <th>발생 시각</th>
                            <th>이벤트 유형</th>
                            <th>상세 메시지</th>
                        </tr>
                    </thead>
                    <tbody>${rows}</tbody>
                </table>
            `;
        } catch (e) {
            console.error('이벤트 로그 로드 실패:', e);
            container.innerHTML = '<div class="log-empty">오류가 발생했습니다.</div>';
        }
    }

    // ─── 시간 포맷 유틸리티 ─────────────────────────────────────
    function formatTime(timestamp) {
        const d = new Date(timestamp);
        return d.toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit' });
    }

    function formatDateTime(timestamp) {
        const d = new Date(timestamp);
        return d.toLocaleString('ko-KR', {
            month: '2-digit', day: '2-digit',
            hour: '2-digit', minute: '2-digit', second: '2-digit'
        });
    }

    // ─── 전체 새로 고침 ──────────────────────────────────────────
    async function refreshAll() {
        await Promise.all([loadHistory(), loadStatistics(), loadEventLogs()]);
        const now = new Date().toLocaleTimeString('ko-KR');
        document.getElementById('lastUpdated').textContent = `마지막 갱신: ${now}`;
    }

    // ─── 기기 변경 이벤트 ────────────────────────────────────────
    document.getElementById('deviceSelect').addEventListener('change', function () {
        currentDeviceId = this.value;
        refreshAll();
    });

    // ─── 기기 목록 동적 로드 ─────────────────────────────────────
    async function loadDevices() {
        const select = document.getElementById('deviceSelect');
        try {
            const res = await fetch('/dashboard/devices');
            if (!res.ok) throw new Error('기기 목록 조회 실패');
            const devices = await res.json();

            select.innerHTML = '';
            if (devices.length === 0) {
                select.innerHTML = '<option value="">등록된 기기 없음</option>';
                return;
            }
            devices.forEach(id => {
                const opt = document.createElement('option');
                opt.value = id;
                opt.textContent = id;
                select.appendChild(opt);
            });
            currentDeviceId = devices[0];
            select.value = currentDeviceId;
        } catch (e) {
            console.error('기기 목록 로드 실패:', e);
            select.innerHTML = '<option value="">로드 실패</option>';
        }
    }

    // ─── 기기 설정 모달 ──────────────────────────────────────────
    async function openConfigModal() {
        if (!currentDeviceId) return;
        document.getElementById('configDeviceId').value = currentDeviceId;
        document.getElementById('configMessage').textContent = '';
        try {
            const res = await fetch(`/api/device-config/${encodeURIComponent(currentDeviceId)}`);
            if (res.ok) {
                const data = await res.json();
                document.getElementById('configTempThreshold').value = data.temperatureThresholdHigh;
                document.getElementById('configHumidityThreshold').value = data.humidityThresholdHigh;
            }
        } catch (e) { /* 기본값 유지 */ }
        document.getElementById('configModal').classList.add('active');
    }

    function closeConfigModal() {
        document.getElementById('configModal').classList.remove('active');
    }

    async function saveConfig() {
        const deviceId = document.getElementById('configDeviceId').value;
        const tempThreshold = parseFloat(document.getElementById('configTempThreshold').value);
        const humidityThreshold = parseFloat(document.getElementById('configHumidityThreshold').value);
        const msgEl = document.getElementById('configMessage');

        try {
            const res = await fetch('/api/device-config', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    deviceId,
                    temperatureThresholdHigh: tempThreshold,
                    humidityThresholdHigh: humidityThreshold
                })
            });
            if (res.ok) {
                msgEl.style.color = '#22c55e';
                msgEl.textContent = '저장되었습니다.';
                setTimeout(closeConfigModal, 800);
            } else {
                msgEl.style.color = '#f87171';
                msgEl.textContent = '저장에 실패했습니다.';
            }
        } catch (e) {
            msgEl.style.color = '#f87171';
            msgEl.textContent = '오류가 발생했습니다.';
        }
    }

    // 모달 외부 클릭 시 닫기
    document.getElementById('configModal').addEventListener('click', function(e) {
        if (e.target === this) closeConfigModal();
    });

    // ─── 초기화 ──────────────────────────────────────────────────
    document.addEventListener('DOMContentLoaded', async () => {
        temperatureChart = createChart('temperatureChart', '온도 (°C)', '#f87171');
        humidityChart = createChart('humidityChart', '습도 (%)', '#34d399');

        await loadDevices();
        if (currentDeviceId) refreshAll();

        // 60초마다 자동 갱신
        setInterval(() => { if (currentDeviceId) refreshAll(); }, 60000);
    });
</script>

</body>
</html>
