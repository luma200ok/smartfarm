<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart-PC Farm 로그인</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #0f172a;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-card {
            width: 100%;
            max-width: 400px;
            padding: 2rem;
            border-radius: 10px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.4);
            background-color: #1e293b;
            border: 1px solid #334155;
        }
        .brand-logo {
            text-align: center;
            margin-bottom: 2rem;
            color: #38bdf8;
        }
        .brand-logo p {
            color: #64748b;
        }
        .form-label {
            color: #94a3b8;
        }
        .form-control {
            background-color: #0f172a;
            border: 1px solid #334155;
            color: #e2e8f0;
        }
        .form-control:focus {
            background-color: #0f172a;
            border-color: #38bdf8;
            color: #e2e8f0;
            box-shadow: 0 0 0 0.2rem rgba(56,189,248,0.15);
        }
        .form-control::placeholder {
            color: #475569;
        }
    </style>
</head>
<body>

<div class="login-card">
    <div class="brand-logo">
        <h2>&#9651; Smart-PC Farm</h2>
        <p>관리자 대시보드 로그인</p>
    </div>

    <div th:if="${param.error}" class="alert alert-danger py-2" role="alert">
        아이디 또는 비밀번호가 올바르지 않습니다.
    </div>
    <div th:if="${param.logout}" class="alert alert-success py-2" role="alert">
        로그아웃 되었습니다.
    </div>

    <form th:action="@{/login}" method="POST">
        <div class="mb-3">
            <label for="username" class="form-label">아이디</label>
            <input type="text" class="form-control" id="username" name="username" placeholder="admin" required autofocus>
        </div>
        <div class="mb-4">
            <label for="password" class="form-label">비밀번호</label>
            <input type="password" class="form-control" id="password" name="password" placeholder="****" required>
        </div>
        <button type="submit" class="btn btn-primary w-100">로그인</button>
    </form>
</div>

</body>
</html>
